<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soja IA - Minha Conta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="dark-mode.css">
    <script>if(localStorage.getItem('darkMode')==='true'){document.documentElement.classList.add('dark-mode');}</script>
    <style>
        :root {
            --verde-soja: #008b8b;
            --laranja-action: #ff7f27;
            --vermelho-erro: #d9534f;
            --bg-gradiente: radial-gradient(circle, #ffffff 0%, #e0e0e0 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { min-height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--bg-gradiente); padding: 20px; }

        .user-card {
            background: white; width: 100%; max-width: 450px; padding: 40px;
            border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        .profile-icon {
            font-size: 60px; color: var(--verde-soja); margin-bottom: 20px;
        }

        h2 { color: #333; font-weight: 800; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }

        .menu-options { display: flex; flex-direction: column; gap: 15px; }

        .btn {
            padding: 15px; border: none; border-radius: 15px;
            font-weight: 700; cursor: pointer; transition: 0.3s;
            text-decoration: none; display: flex; align-items: center;
            justify-content: center; gap: 10px; font-size: 16px;
        }

        /* Estilo do novo botão Editar Mapas */
        .btn-maps { background: var(--verde-soja); color: white; }
        .btn-maps:hover { background: #007070; transform: translateY(-2px); }

        .btn-logout { background: #f4f4f4; color: #333; }
        .btn-logout:hover { background: #e0e0e0; }

        .btn-delete { background: white; color: var(--vermelho-erro); border: 2px solid #fee; }
        .btn-delete:hover { background: #fff5f5; border-color: var(--vermelho-erro); }

        .btn-back { background: var(--laranja-action); color: white; }
        .btn-back:hover { background: #e67e22; transform: translateY(-2px); }

        /* DARK MODE STYLES */
        html.dark-mode body {
            background: radial-gradient(circle, #1a1a1a 0%, #0d0d0d 100%) !important;
        }

        html.dark-mode .user-card {
            background: #1d1d1d !important;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5) !important;
        }

        html.dark-mode .profile-icon {
            color: var(--verde-soja) !important;
        }

        html.dark-mode h2 {
            color: #cccccc !important;
        }

        html.dark-mode p {
            color: #aaaaaa !important;
        }

        html.dark-mode .btn-maps {
            background: var(--verde-soja) !important;
            color: white !important;
        }

        html.dark-mode .btn-maps:hover {
            background: #00a3a3 !important;
        }

        html.dark-mode .btn-logout {
            background: #2a2a2a !important;
            color: #cccccc !important;
        }

        html.dark-mode .btn-logout:hover {
            background: #3a3a3a !important;
        }

        html.dark-mode .btn-delete {
            background: transparent !important;
            color: #ff8b7b !important;
            border-color: #5a3a3a !important;
        }

        html.dark-mode .btn-delete:hover {
            background: #2a1a1a !important;
            border-color: #ff8b7b !important;
        }

        html.dark-mode .btn-back {
            background: var(--laranja-action) !important;
            color: white !important;
        }

        html.dark-mode .btn-back:hover {
            background: #e66a1f !important;
        }
    </style>
</head>
<body>

    <div class="user-card">
        <div class="profile-icon">
            <i class="fas fa-user-circle"></i>
        </div>
        
        <h2 id="displayName">Carregando...</h2>
        <p id="displayEmail">Verificando sessão...</p>

        <div class="menu-options">
            <a href="/" class="btn btn-back">
                <i class="fas fa-arrow-left"></i> Voltar
            </a>

            <a href="/mapa" class="btn btn-maps">
                <i class="fas fa-map-marked-alt"></i> Editar Mapas
            </a>

            <button id="logoutBtn" class="btn btn-logout">
                <i class="fas fa-sign-out-alt"></i> Sair da Conta
            </button>

            <button id="deleteAccountBtn" class="btn btn-delete">
                <i class="fas fa-trash-alt"></i> Excluir minha conta
            </button>
        </div>
    </div>

    <script>
        // --- PROTEÇÃO DE ROTA E CARREGAMENTO ---
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            const userName = localStorage.getItem('userName');

            if (!token) {
                window.location.href = "/login";
                return;
            }

            // Exibe o nome que já temos no localStorage
            document.getElementById('displayName').innerText = userName || "Usuário";

            // Valida o token com o servidor para pegar o e-mail ou confirmar sessão
            try {
                const res = await fetch('/api/checar-sessao', {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('displayEmail').innerText = data.email;
                } else {
                    throw new Error("Sessão expirada");
                }
            } catch (err) {
                localStorage.clear();
                window.location.href = "/login";
            }
        });

        // --- FUNÇÃO LOGOUT ---
        document.getElementById('logoutBtn').onclick = () => {
            localStorage.clear();
            window.location.href = "/login";
        };

        // --- FLUXO DE EXCLUSÃO COM JWT ---
        document.getElementById('deleteAccountBtn').onclick = async () => {
            const token = localStorage.getItem('token');

            if (confirm("Para sua segurança, um código de confirmação será enviado ao seu e-mail. Deseja prosseguir?")) {
                
                const res = await fetch('/api/solicitar-exclusao', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` // Identificação via JWT
                    }
                });

                if (res.ok) {
                    alert("Código enviado! Você será redirecionado para a página de verificação.");
                    localStorage.setItem('flow', 'delete'); // Define que o fluxo é exclusão
                    window.location.href = "/verificar";
                } else {
                    const data = await res.json();
                    alert("Erro: " + (data.erro || "Não foi possível solicitar a exclusão."));
                }
            }
        };
    </script>
</body>
</html>
